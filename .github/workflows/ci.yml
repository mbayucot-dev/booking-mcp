name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Audit dependencies (known CVEs)
        run: |
          pip install pip-audit
          pip-audit --skip-editable
      - name: Lint
        run: ruff check src tests
      - name: Test (Postgres via testcontainers; Docker is preinstalled on the runner)
        run: pytest --cov=booking_mcp --cov-report=term-missing
