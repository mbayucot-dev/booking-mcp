name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── locked build: installs exactly what was tested locally ──────────────────
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (from lockfile — reproducible)
        run: uv sync --frozen --extra dev
      - name: Audit dependencies (known CVEs)
        run: uv run --extra dev python -m pip_audit --skip-editable
      - name: Lint
        run: uv run ruff check src tests
      - name: Test (Postgres via testcontainers; Docker is preinstalled on the runner)
        run: uv run pytest --cov=booking_mcp --cov-report=term-missing

  # ── canary build: re-resolves deps to latest allowed by pyproject.toml ──────
  # Detects FastMCP/MCP compatibility breaks before they hit the locked prod build.
  # Allowed to fail: a canary failure should open a tracking issue, not block merges.
  canary:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (latest deps within declared ranges — no lockfile)
        run: uv sync --upgrade --extra dev
      - name: Audit (canary env)
        run: uv run --extra dev python -m pip_audit --skip-editable
      - name: Lint (canary env)
        run: uv run ruff check src tests
      - name: Test (canary env — flag FastMCP/MCP compat breaks early)
        run: uv run pytest --cov=booking_mcp --cov-report=term-missing
